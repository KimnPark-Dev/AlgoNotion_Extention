<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AlgoNotion 설정</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 16px;
        max-width: 720px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      p {
        color: #444;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        box-sizing: border-box;
      }

      small {
        display: block;
        margin-top: 6px;
        color: #666;
      }

      button {
        margin-top: 16px;
        padding: 8px 14px;
        cursor: pointer;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }

      /* Notion 연결 영역 */
      .notion-connect-area {
        margin-top: 16px;
        padding: 12px 14px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
      }

      .notion-connect-area .connected-label {
        font-size: 13px;
        color: #2e7d32;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .notion-connect-area .disconnected-label {
        font-size: 13px;
        color: #555;
        margin-bottom: 6px;
      }

      #btn-notion-connect {
        background: #000;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 8px;
      }

      #btn-notion-connect:hover {
        background: #333;
      }

      #btn-notion-disconnect {
        background: #fff;
        color: #c62828;
        border: 1px solid #c62828;
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        margin-top: 6px;
      }

      #btn-notion-disconnect:hover {
        background: #fff0f0;
      }

      #btn-template {
        display: block;
        width: 100%;
        margin-top: 24px;
        padding: 9px;
        background: #fff;
        color: #333;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        text-align: center;
        box-sizing: border-box;
      }

      #btn-template:hover {
        background: #f5f5f5;
        border-color: #bbb;
      }
    </style>
  </head>
  <body>
    <h1>AlgoNotion 설정</h1>
    <p>OpenAI 비용은 공용 백엔드가 부담하고, Notion 저장은 각자 자신의 워크스페이스를 사용합니다.</p>

    <label for="user-name">사용자 이름</label>
    <input
      id="user-name"
      type="text"
      placeholder="name"
    />
    <small>Notion 데이터베이스에 기록될 사용자 이름입니다.</small>

    <label>Notion 연결</label>
    <div class="notion-connect-area">
      <div id="notion-status-label" class="disconnected-label">연결되지 않음</div>
      <button id="btn-notion-connect" type="button">Notion으로 로그인</button>
      <button id="btn-notion-disconnect" type="button" style="display:none;">연결 해제</button>
    </div>
    <small>Notion 워크스페이스에 AlgoNotion을 연결합니다.</small>

    <label for="notion-database-id">Notion Database ID</label>
    <input
      id="notion-database-id"
      type="text"
      placeholder="https://www.notion.so/..."
    />
    <small>링크 붙여넣으면 ID를 자동으로 추출합니다.</small>

    <button id="save-button" type="button">저장</button>

    <div id="status"></div>

    <button id="btn-template" type="button">📋 Notion 템플릿 가져오기</button>

    <script type="module" src="options.js"></script>
  </body>
</html>
