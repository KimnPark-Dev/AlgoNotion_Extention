<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AlgoNotion</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 320px;
        padding: 16px;
        margin: 0;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 14px 0;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #333;
      }

      input {
        width: 100%;
        padding: 7px 9px;
        box-sizing: border-box;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 10px;
      }

      input:focus {
        outline: none;
        border-color: #6366f1;
      }

      small {
        display: block;
        font-size: 11px;
        color: #888;
        margin-top: -8px;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 8px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover {
        background: #4f46e5;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        text-align: center;
        min-height: 16px;
        color: #555;
      }

      #status.error   { color: #dc2626; }
      #status.success { color: #16a34a; }

      /* Notion 연결 영역 */
      .notion-connect-area {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
        margin-bottom: 12px;
      }

      #notion-status-label {
        font-size: 12px;
        color: #555;
      }

      #notion-status-label.connected {
        color: #16a34a;
        font-weight: 600;
      }

      #btn-notion-connect {
        width: auto;
        padding: 5px 10px;
        font-size: 12px;
        background: #000;
        border-radius: 4px;
      }

      #btn-notion-connect:hover { background: #333; }

      #btn-notion-disconnect {
        width: auto;
        padding: 5px 10px;
        font-size: 12px;
        background: #fff;
        color: #c62828;
        border: 1px solid #c62828;
        border-radius: 4px;
      }

      #btn-notion-disconnect:hover { background: #fff0f0; }
    </style>
  </head>
  <body>
    <h1>AlgoNotion 설정</h1>

    <!-- Notion 연결 상태 -->
    <div class="notion-connect-area">
      <span id="notion-status-label">연결되지 않음</span>
      <button id="btn-notion-connect" type="button">Notion 연결</button>
      <button id="btn-notion-disconnect" type="button" style="display:none;">연결 해제</button>
    </div>

    <label for="user-name">사용자 이름</label>
    <input id="user-name" type="text" placeholder="user-name" />

    <label for="notion-db-url">Notion Database 링크</label>
    <input id="notion-db-url" type="text" placeholder="https://www.notion.so/..." />
    <small>링크 붙여넣으면 ID를 자동으로 추출합니다.</small>

    <button id="save-btn">저장</button>
    <div id="status"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
